version: "3.9"

services:
  rtsp-web-player:
    logging:
      driver: "db"
      options:
        max-size: "1M"
        max-file: "2"
    stop_grace_period: 1m
    container_name: rtsp-web-player
    image: rtsp-web-player:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: "1.0.0"
    restart: unless-stopped
    init: false
    pull_policy: if_not_present
    environment:
      PUID: "1026"
      PGID: "100"
      VAAPI_DRIVER_NAME: "iHD"
      TZ: "Europe/Amsterdam"
      GPU: "Y"
      LANGUAGE: "en_US.UTF-8"
      LANG: "C.UTF-8"
      PORT: "3001"
      STATIC_PORT: "80"
      HOST: "nas.iamjairo.com"
      VITE_API_URL: "https://rtsp-web-player.iamjairo.com:3001"
      NODE_ENV: "production"
    domainname: rtsp-web-player.iamjairo.com
    hostname: rtsp-web-player
    networks:
      rtsp-web-player_net:
        ipv4_address: 172.31.22.2
    ports:
      - "32771:80"
      - "32772:3001"
    privileged: true
    volumes:
      - rtsp-web-player:/app/server/streams
    security_opt:
      - no-new-privileges:true
    labels:
      networkmanager.managed: "true"
      networkmanager.networks: "rtsp-web-player_net:172.31.22.2"
      com.docker.compose.project: rtsp-web-player
      com.docker.compose.project.config_files: /volume1/media-WebRTC/rtsp-web-player/docker-compose.yml
      com.docker.compose.project.working_dir: /volume1/media-WebRTC/rtsp-web-player
      com.docker.compose.service: "rtsp-web-player"
      com.rtsp-web-player.description: "Stream multiple RTSP feeds in your browser with a modern web app that auto-discovers cameras and converts streams to HLS for seamless playback"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  rtsp-web-player:
    driver: local
    
networks:
  rtsp-web-player_net:
    attachable: false
    internal: false
    external: false
    name: rtsp-web-player
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.31.22.0/24
          ip_range: 172.31.22.0/24
          gateway: 172.31.22.1
    driver_opts:
      com.docker.network.bridge.default_bridge: "false"
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.bridge.host_binding_ipv4: "0.0.0.0"
      com.docker.network.bridge.name: "rtsp-web-player"
      com.docker.network.driver.mtu: "1500"
    labels:
      com.rtsp-web-player.network.description: "is an isolated bridge network."
