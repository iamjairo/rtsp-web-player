version: "3.9"

services:
  rtsp-web-player:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rtsp-web-player
    restart: unless-stopped

    ports:
      # Frontend (React SPA)
      - "80:80"
      # Backend API + WebSocket streams
      - "3001:3001"

    environment:
      # Backend API port (inside the container)
      - PORT=3001
      # Static frontend port (inside the container)
      - STATIC_PORT=80
      # Hostname used to build self-referencing API URLs (stream URLs returned by the backend).
      # Change to the server's public IP or hostname when running remotely.
      - HOST=localhost
      # Frontend points to the backend. If running on a remote host, change
      # "localhost" to the host's IP or domain name.
      - VITE_API_URL=http://localhost:3001

    volumes:
      # Persist HLS segment files between container restarts
      - streams-data:/app/server/streams

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  streams-data:
    driver: local
